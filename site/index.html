<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <script type="module" src="src/ui.js"></script>
    <title>Tag Manager</title>
  </head>
  <body>
    <header></header>
    <div id="nav-and-main-container">
      <nav>
        <p id="preview-file-path">No File Selected</p>
        <div id="preview-image-container">
          <img id="preview-image" src="https://placehold.co/200" />
        </div>
        <form id="add-tag-form" autocomplete="off">
          <div class="input-and-label-container">
            <label for="tagName">Add Tag</label>
            <input type="text" list="tag-suggestions" name="tagName" id="add-tag-input" />
            <datalist id="tag-suggestions"></datalist>
          </div>
        </form>
        <div id="tag-list-container">
          <div id="tag-drop-divs-container"></div>
          <ol id="tag-list">
        </div>
        </ol>
      </nav>
      <main>
        <div class="thumbnail">
          <div class="thumbnail-image-container">
            <img src="https://placehold.co/100" />
          </div>
          <p class="thumbnail-file-path">path</p>
        </div>
        <div class="thumbnail">
          <div class="thumbnail-image-container">
            <img src="https://placehold.co/100x200" />
          </div>
          <p class="thumbnail-file-path">path</p>
        </div>
      </main>
    </div>
    <footer></footer>
  </body>
</html>
